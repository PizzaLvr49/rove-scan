[package]
name = "rove-scan"
version = "0.1.0"
edition = "2024"

[dependencies]
cortex-m-rt = "0.7.5"
cyw43 = { version = "0.7.0", features = ["defmt", "firmware-logs"] }
cyw43-pio = { version = "0.10.0", features = ["defmt"] }
defmt = "1.1.0"
defmt-rtt = "1.2.0"
embassy-executor = { version = "0.10.0", features = [
    "platform-cortex-m",
    "defmt",
    "executor-thread",
] }
embassy-net = { version = "0.9.1", features = [
    "tcp",
    "udp",
    "dhcpv4",
    "medium-ethernet",
    "proto-ipv4",
    "dns",
    "defmt",
] }
embassy-rp = { version = "0.10.0", features = [
    "critical-section-impl",
    "defmt",
    "rp235xa",
    "time-driver",
] }
embassy-time = { version = "0.5.1", features = [
    "defmt",
    "defmt-timestamp-uptime",
] }
embedded-alloc = "0.7.0"
embedded-io = { version = "0.7.1", features = ["alloc", "defmt"] }
heapless = { version = "0.9.3", features = ["alloc", "defmt"] }
icm426xx = { version = "0.4.0", features = ["async", "defmt"] }
panic-probe = { version = "1.0.0", features = ["print-defmt"] }
portable-atomic = { version = "1.13.1", features = ["critical-section"] }
postcard = { version = "1.1.3", features = ["defmt"] }
static_cell = "2.1.1"
vl53l1x-uld = "2.0.1"

[[bin]]
name = "rove-scan"
path = "src/main.rs"
test = false
bench = false
